<div id="SendToKindleConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-select,emby-checkbox">
    <div data-role="content">
        <div class="content-primary">
            <form id="SendToKindleConfigForm">
                <h1>Send to Kindle</h1>

                <h2>SMTP</h2>
                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="SmtpHost">Host</label>
                    <input id="SmtpHost" is="emby-input" type="text" autocomplete="off" />
                </div>
                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="SmtpPort">Port</label>
                    <input id="SmtpPort" is="emby-input" type="number" min="1" max="65535" value="587" required />
                </div>
                <div class="selectContainer">
                    <label class="selectLabel" for="SmtpSecurity">Security</label>
                    <select id="SmtpSecurity" is="emby-select">
                        <option value="0">Auto</option>
                        <option value="1" selected>STARTTLS</option>
                        <option value="2">TLS on connect</option>
                        <option value="3">None</option>
                    </select>
                </div>
                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="SmtpUsername">Username</label>
                    <input id="SmtpUsername" is="emby-input" type="text" autocomplete="username" />
                </div>
                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="SmtpPassword">Password</label>
                    <input id="SmtpPassword" is="emby-input" type="password" autocomplete="current-password" />
                </div>
                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="SenderAddress">Sender address</label>
                    <input id="SenderAddress" is="emby-input" type="email" autocomplete="email" />
                </div>
                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="KindleAddress">Kindle address</label>
                    <input id="KindleAddress" is="emby-input" type="email" autocomplete="off" />
                </div>

                <h2>Conversion</h2>
                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="KccExecutable">KCC executable</label>
                    <input id="KccExecutable" is="emby-input" type="text" value="kcc-c2e" required />
                </div>
                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="CalibreExecutable">Calibre executable</label>
                    <input id="CalibreExecutable" is="emby-input" type="text" value="ebook-convert" required />
                </div>
                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="TemporaryDirectory">Temporary directory</label>
                    <input id="TemporaryDirectory" is="emby-input" type="text" />
                </div>
                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="AttachmentLimitMegabytes">Attachment limit (MB)</label>
                    <input id="AttachmentLimitMegabytes" is="emby-input" type="number" min="1" max="50" value="18" required />
                </div>
                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="ConversionTimeoutMinutes">Timeout (minutes)</label>
                    <input id="ConversionTimeoutMinutes" is="emby-input" type="number" min="1" max="180" value="30" required />
                </div>

                <h2>KCC</h2>
                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="KccProfile">Device profile</label>
                    <input id="KccProfile" is="emby-input" type="text" value="KV" required />
                </div>
                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="KccGamma">Gamma</label>
                    <input id="KccGamma" is="emby-input" type="text" value="Auto" />
                </div>
                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="KccSplitter">Splitter</label>
                    <input id="KccSplitter" is="emby-input" type="number" min="0" max="2" value="0" />
                </div>
                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="KccCropping">Cropping</label>
                    <input id="KccCropping" is="emby-input" type="number" min="0" max="2" value="2" />
                </div>
                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="KccCroppingPower">Cropping power</label>
                    <input id="KccCroppingPower" is="emby-input" type="number" min="0" max="2" step="0.05" value="1" />
                </div>
                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="KccJpegQuality">JPEG quality</label>
                    <input id="KccJpegQuality" is="emby-input" type="number" min="0" max="95" value="85" />
                </div>

                <label class="checkboxContainer"><input id="KccMangaStyle" is="emby-checkbox" type="checkbox" /><span>Manga style</span></label>
                <label class="checkboxContainer"><input id="KccHighQuality" is="emby-checkbox" type="checkbox" /><span>High quality</span></label>
                <label class="checkboxContainer"><input id="KccTwoPanel" is="emby-checkbox" type="checkbox" /><span>Two-panel mode</span></label>
                <label class="checkboxContainer"><input id="KccWebtoon" is="emby-checkbox" type="checkbox" /><span>Webtoon mode</span></label>
                <label class="checkboxContainer"><input id="KccUpscale" is="emby-checkbox" type="checkbox" /><span>Upscale</span></label>
                <label class="checkboxContainer"><input id="KccStretch" is="emby-checkbox" type="checkbox" /><span>Stretch</span></label>
                <label class="checkboxContainer"><input id="KccAutoLevel" is="emby-checkbox" type="checkbox" /><span>Auto level</span></label>
                <label class="checkboxContainer"><input id="KccDisableAutoContrast" is="emby-checkbox" type="checkbox" /><span>Disable auto contrast</span></label>
                <label class="checkboxContainer"><input id="KccForceColor" is="emby-checkbox" type="checkbox" /><span>Force color</span></label>
                <label class="checkboxContainer"><input id="KccSpreadShift" is="emby-checkbox" type="checkbox" /><span>Spread shift</span></label>
                <label class="checkboxContainer"><input id="KccOnePageLandscape" is="emby-checkbox" type="checkbox" /><span>One page in landscape</span></label>

                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="KccAdvancedArguments">Advanced arguments</label>
                    <input id="KccAdvancedArguments" is="emby-input" type="text" autocomplete="off" />
                </div>

                <div style="display:flex;flex-wrap:wrap;gap:.75em;margin-top:2em">
                    <button is="emby-button" type="submit" class="raised button-submit block"><span>Save</span></button>
                    <button id="TestSmtp" is="emby-button" type="button" class="raised block"><span>Test SMTP</span></button>
                    <button id="TestConverters" is="emby-button" type="button" class="raised block"><span>Test converters</span></button>
                </div>
                <div id="DiagnosticResult" role="status" style="margin-top:1em;white-space:pre-wrap"></div>
            </form>
        </div>
    </div>

    <script type="text/javascript">
        (() => {
            const pluginId = '4c4061d6-1c66-4a34-99f9-bbf618c51621';
            const page = document.querySelector('#SendToKindleConfigPage');
            const form = page.querySelector('#SendToKindleConfigForm');
            const value = id => page.querySelector('#' + id).value;
            const checked = id => page.querySelector('#' + id).checked;
            const setValue = (id, next) => { page.querySelector('#' + id).value = next ?? ''; };
            const setChecked = (id, next) => { page.querySelector('#' + id).checked = Boolean(next); };
            const defaults = {
                SmtpHost: '',
                SmtpPort: 587,
                SmtpSecurity: 1,
                SmtpUsername: '',
                SmtpPassword: '',
                SenderAddress: '',
                KindleAddress: '',
                KccExecutable: 'kcc-c2e',
                CalibreExecutable: 'ebook-convert',
                TemporaryDirectory: '',
                AttachmentLimitMegabytes: 18,
                ConversionTimeoutMinutes: 30,
                Kcc: {
                    Profile: 'KV',
                    Gamma: 'Auto',
                    Splitter: 0,
                    Cropping: 2,
                    CroppingPower: 1,
                    JpegQuality: 85,
                    MangaStyle: false,
                    HighQuality: false,
                    TwoPanel: false,
                    Webtoon: false,
                    Upscale: false,
                    Stretch: false,
                    AutoLevel: false,
                    DisableAutoContrast: false,
                    ForceColor: false,
                    SpreadShift: false,
                    OnePageLandscape: false,
                    AdvancedArguments: ''
                }
            };

            function readProperty(source, name, fallback) {
                if (!source) {
                    return fallback;
                }

                const camelName = name.charAt(0).toLowerCase() + name.slice(1);
                return source[name] ?? source[camelName] ?? fallback;
            }

            function readNumber(source, name, fallback, minimum, maximum) {
                const next = Number(readProperty(source, name, fallback));
                return Number.isFinite(next) && next >= minimum && next <= maximum ? next : fallback;
            }

            function showResult(lines) {
                page.querySelector('#DiagnosticResult').textContent = Array.isArray(lines) ? lines.join('\n') : lines;
            }

            function formatDiagnostic(result) {
                const name = result.Name ?? result.name ?? 'Check';
                const success = result.Success ?? result.success ?? false;
                const message = result.Message ?? result.message ?? '';
                return name + ': ' + (success ? 'OK' : 'FAILED') + ' - ' + message;
            }

            async function loadConfiguration() {
                Dashboard.showLoadingMsg();
                try {
                    const config = await ApiClient.getPluginConfiguration(pluginId);
                    setValue('SmtpHost', readProperty(config, 'SmtpHost', defaults.SmtpHost));
                    setValue('SmtpPort', readNumber(config, 'SmtpPort', defaults.SmtpPort, 1, 65535));
                    setValue('SmtpSecurity', readNumber(config, 'SmtpSecurity', defaults.SmtpSecurity, 0, 3));
                    setValue('SmtpUsername', readProperty(config, 'SmtpUsername', defaults.SmtpUsername));
                    setValue('SmtpPassword', readProperty(config, 'SmtpPassword', defaults.SmtpPassword));
                    setValue('SenderAddress', readProperty(config, 'SenderAddress', defaults.SenderAddress));
                    setValue('KindleAddress', readProperty(config, 'KindleAddress', defaults.KindleAddress));
                    setValue('KccExecutable', readProperty(config, 'KccExecutable', defaults.KccExecutable));
                    setValue('CalibreExecutable', readProperty(config, 'CalibreExecutable', defaults.CalibreExecutable));
                    setValue('TemporaryDirectory', readProperty(config, 'TemporaryDirectory', defaults.TemporaryDirectory));
                    setValue(
                        'AttachmentLimitMegabytes',
                        readNumber(config, 'AttachmentLimitMegabytes', defaults.AttachmentLimitMegabytes, 1, 50));
                    setValue(
                        'ConversionTimeoutMinutes',
                        readNumber(config, 'ConversionTimeoutMinutes', defaults.ConversionTimeoutMinutes, 1, 180));

                    const kcc = readProperty(config, 'Kcc', defaults.Kcc);
                    setValue('KccProfile', readProperty(kcc, 'Profile', defaults.Kcc.Profile));
                    setValue('KccGamma', readProperty(kcc, 'Gamma', defaults.Kcc.Gamma));
                    setValue('KccSplitter', readNumber(kcc, 'Splitter', defaults.Kcc.Splitter, 0, 2));
                    setValue('KccCropping', readNumber(kcc, 'Cropping', defaults.Kcc.Cropping, 0, 2));
                    setValue(
                        'KccCroppingPower',
                        readNumber(kcc, 'CroppingPower', defaults.Kcc.CroppingPower, 0, 2));
                    setValue('KccJpegQuality', readNumber(kcc, 'JpegQuality', defaults.Kcc.JpegQuality, 0, 95));
                    setChecked('KccMangaStyle', readProperty(kcc, 'MangaStyle', defaults.Kcc.MangaStyle));
                    setChecked('KccHighQuality', readProperty(kcc, 'HighQuality', defaults.Kcc.HighQuality));
                    setChecked('KccTwoPanel', readProperty(kcc, 'TwoPanel', defaults.Kcc.TwoPanel));
                    setChecked('KccWebtoon', readProperty(kcc, 'Webtoon', defaults.Kcc.Webtoon));
                    setChecked('KccUpscale', readProperty(kcc, 'Upscale', defaults.Kcc.Upscale));
                    setChecked('KccStretch', readProperty(kcc, 'Stretch', defaults.Kcc.Stretch));
                    setChecked('KccAutoLevel', readProperty(kcc, 'AutoLevel', defaults.Kcc.AutoLevel));
                    setChecked(
                        'KccDisableAutoContrast',
                        readProperty(kcc, 'DisableAutoContrast', defaults.Kcc.DisableAutoContrast));
                    setChecked('KccForceColor', readProperty(kcc, 'ForceColor', defaults.Kcc.ForceColor));
                    setChecked('KccSpreadShift', readProperty(kcc, 'SpreadShift', defaults.Kcc.SpreadShift));
                    setChecked(
                        'KccOnePageLandscape',
                        readProperty(kcc, 'OnePageLandscape', defaults.Kcc.OnePageLandscape));
                    setValue(
                        'KccAdvancedArguments',
                        readProperty(kcc, 'AdvancedArguments', defaults.Kcc.AdvancedArguments));
                } finally {
                    Dashboard.hideLoadingMsg();
                }
            }

            page.addEventListener('pageshow', loadConfiguration);
            form.addEventListener('submit', async event => {
                event.preventDefault();
                Dashboard.showLoadingMsg();
                try {
                    const config = await ApiClient.getPluginConfiguration(pluginId);
                    Object.assign(config, {
                        SmtpHost: value('SmtpHost').trim(),
                        SmtpPort: Number(value('SmtpPort')),
                        SmtpSecurity: Number(value('SmtpSecurity')),
                        SmtpUsername: value('SmtpUsername'),
                        SmtpPassword: value('SmtpPassword'),
                        SenderAddress: value('SenderAddress').trim(),
                        KindleAddress: value('KindleAddress').trim(),
                        KccExecutable: value('KccExecutable').trim(),
                        CalibreExecutable: value('CalibreExecutable').trim(),
                        TemporaryDirectory: value('TemporaryDirectory').trim(),
                        AttachmentLimitMegabytes: Number(value('AttachmentLimitMegabytes')),
                        ConversionTimeoutMinutes: Number(value('ConversionTimeoutMinutes')),
                        Kcc: {
                            Profile: value('KccProfile').trim(),
                            Gamma: value('KccGamma').trim(),
                            Splitter: Number(value('KccSplitter')),
                            Cropping: Number(value('KccCropping')),
                            CroppingPower: Number(value('KccCroppingPower')),
                            JpegQuality: Number(value('KccJpegQuality')),
                            MangaStyle: checked('KccMangaStyle'),
                            HighQuality: checked('KccHighQuality'),
                            TwoPanel: checked('KccTwoPanel'),
                            Webtoon: checked('KccWebtoon'),
                            Upscale: checked('KccUpscale'),
                            Stretch: checked('KccStretch'),
                            AutoLevel: checked('KccAutoLevel'),
                            DisableAutoContrast: checked('KccDisableAutoContrast'),
                            ForceColor: checked('KccForceColor'),
                            SpreadShift: checked('KccSpreadShift'),
                            OnePageLandscape: checked('KccOnePageLandscape'),
                            AdvancedArguments: value('KccAdvancedArguments').trim()
                        }
                    });
                    const result = await ApiClient.updatePluginConfiguration(pluginId, config);
                    Dashboard.processPluginConfigurationUpdateResult(result);
                } finally {
                    Dashboard.hideLoadingMsg();
                }
            });

            page.querySelector('#TestSmtp').addEventListener('click', async () => {
                Dashboard.showLoadingMsg();
                try {
                    const result = await ApiClient.ajax({
                        type: 'POST',
                        url: ApiClient.getUrl('SendToKindle/Diagnostics/Smtp'),
                        dataType: 'json'
                    });
                    showResult(formatDiagnostic(result));
                } finally {
                    Dashboard.hideLoadingMsg();
                }
            });

            page.querySelector('#TestConverters').addEventListener('click', async () => {
                Dashboard.showLoadingMsg();
                try {
                    const results = await ApiClient.ajax({
                        type: 'POST',
                        url: ApiClient.getUrl('SendToKindle/Diagnostics/Converters'),
                        dataType: 'json'
                    });
                    showResult(results.map(formatDiagnostic));
                } finally {
                    Dashboard.hideLoadingMsg();
                }
            });
        })();
    </script>
</div>
